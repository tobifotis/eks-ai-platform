replicaCount: 1

config:
  baseURL: ""
  pluginsDir: /headlamp/plugins

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

persistentVolumeClaim:
  enabled: true
  size: 1Gi
  storageClassName: gp3
  accessModes:
    - ReadWriteOnce